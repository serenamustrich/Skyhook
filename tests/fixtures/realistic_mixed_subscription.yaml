proxies:
  - name: HK-SS-01
    type: ss
    server: hk.example.com
    port: 8388
    cipher: aes-128-gcm
    password: secret
    plugin: obfs
    plugin-opts:
      mode: http
      host: edge.example.com
  - name: SG-Trojan-01
    type: trojan
    server: sg.example.com
    port: 443
    password: secret
    sni: cdn.example.com
    skip-cert-verify: false
  - name: JP-VLESS-WS-01
    type: vless
    server: jp.example.com
    port: 443
    uuid: 11111111-1111-1111-1111-111111111111
    tls: true
    servername: cdn.example.com
    network: ws
    ws-opts:
      path: /ray
      headers:
        Host: edge.example.com
  - name: US-VMess-WS-01
    type: vmess
    server: us.example.com
    port: 443
    uuid: 22222222-2222-2222-2222-222222222222
    alterId: 0
    cipher: auto
    tls: true
    servername: vmess.example.com
    network: ws
    ws-opts:
      path: /ws
      headers:
        Host: vmess-edge.example.com
proxy-groups:
  - name: Auto
    type: url-test
    proxies:
      - HK-SS-01
      - SG-Trojan-01
      - JP-VLESS-WS-01
      - US-VMess-WS-01
rules:
  - DOMAIN-SUFFIX,example.com,Auto
  - DOMAIN-KEYWORD,openai,Auto
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - MATCH,Auto
